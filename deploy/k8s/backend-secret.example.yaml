apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: saarkaar-prod
type: Opaque
stringData:
  # ⚠️ IMPORTANT: This is an EXAMPLE file. Never commit real secrets!
  # Create a real secret using: kubectl apply -f backend-secret.yaml
  OPENAI_API_KEY: "sk-xxxxxxxxxxxxxxxx"
  # Use MongoDB Atlas free tier: https://cloud.mongodb.com
  # Format: mongodb+srv://username:password@cluster.mongodb.net/saarkaar_db
  MONGODB_URI: "mongodb+srv://username:password@cluster.mongodb.net/saarkaar_db"
  ADMIN_PASSWORD: "change-this-strong-password"
  ADMIN_JWT_SECRET: "change-this-long-random-secret-min-32-chars"
